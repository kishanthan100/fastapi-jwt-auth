<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My App{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4fdf4;
            margin: 0;
            padding: 0;
        }

        header {
            background: #2e7d32;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            padding: 6px 12px;
            border: 1px solid #fff;
            border-radius: 4px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        nav a:hover {
            background-color: #fff;
            color: #2e7d32;
        }

        main {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        thead {
            background: #2e7d32;
            color: #fff;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
        }

        tbody tr:nth-child(even) {
            background: #e8f5e9;
        }

        tbody tr:hover {
            background: #c8e6c9;
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <header>
        <h1>{% block header_title %}Dashboard{% endblock %}</h1>
        <nav>
            <a href="/items/dashboard">Home</a>
            <a href="/services">Services</a>
            <a href="/contact">Contact</a>
             <a href="/logout">
        <!-- User icon -->
        <svg xmlns="http://www.w3.org/2000/svg" 
             width="18" height="18" 
             fill="currentColor" 
             viewBox="0 0 16 16" 
             style="vertical-align: middle; margin-right: 6px;">
            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
            <path fill-rule="evenodd" d="M14 14s-1-1.5-6-1.5S2 14 2 14s1-4 6-4 6 4 6 4z"/>
        </svg>
        Logout
    </a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
