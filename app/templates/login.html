<!DOCTYPE html>
<html>
<head>
    <title>Thamizhi Data Solution - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
        }

        /* Left side - Login */
        .login-section {
            flex: 2;
            background: #1f201f;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset -2px 0 8px rgba(0,0,0,0.1);
        }

        .login-container {
            width: 320px;
            padding: 30px;
            border-radius: 10px;
            background: #494949;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #f3f4f3; /* Natural green */
        }

        label {
            display: block;
            text-align: left;
            margin: 10px 0 5px;
            font-weight: bold;
            color: #ffffff;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ffffff;
            border-radius: 5px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #2e7d32;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2e7d32;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #1b5e20;
        }

        .register-link {
            margin-top: 15px;
            font-size: 14px;
            color: #fdfdfd;
        }

        .register-link a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Right side - Thoughts/Company Info */
        .thoughts-section {
            flex: 3;
            background: linear-gradient(135deg, #1c1c1c, #494f4a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            
            text-align: center;
        }

       

        .thoughts-section p {
            font-size: 16px;
            line-height: 1.6;
            max-width: 80%;
            padding: 10px;
        }

        

        .client-experience p {
            font-size: 30px;
            line-height: 1.5;
            color: #ffffff;
        }

    </style>
</head>
<body>
    <!-- Left: Login -->
    <div class="login-section">
        <div class="login-container">
            <h2>Login</h2>
            <form action="/login-form" method="post">
                <label>Email:</label>
                <input type="text"  id="email" name="email" required>

                <label>Password:</label>
                <input type="password"  id="password" name="password" required>
                {% if error %}
                <div id="error-message"  style="color: #e86c6c;">
                    {{ error }}
                </div>
                {% endif %}

                <button type="submit" id="loginBtn" disabled>Login</button>
            </form>

            <div class="register-link">
                Don’t have an account? <a href="/register">Register</a>
            </div>
        </div>
    </div>

    <!-- Right: Thoughts -->
    <div class="thoughts-section">
    <div>        <!-- Client Experience Section -->
        <div class="client-experience">

            <p>
                "Working with Thamizhi Data Solution has been a transformative 
                experience. Their insights and dedication helped us unlock new 
                opportunities and achieve sustainable growth."
            </p>
            <p><strong>- Priya Kumar, CEO of GreenTech Innovations</strong></p>
        </div>
    </div>
</div>

</body>
<script>
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");

    function toggleButton() {
        if (emailInput.value.trim() !== "" && passwordInput.value.trim() !== "") {
            loginBtn.disabled = false;
            loginBtn.style.filter = "none"; // remove blur
        } else {
            loginBtn.disabled = true;
            loginBtn.style.filter = "blur(1px)"; // blur when disabled
        }
    }

    emailInput.addEventListener("input", toggleButton);
    passwordInput.addEventListener("input", toggleButton);

    setTimeout(function () {
        const errorBox = document.getElementById("error-message");
        if (errorBox) {
            errorBox.style.display = "none";
        }
    }, 4000); // 4000 ms = 4 seconds
</script>
</html>
